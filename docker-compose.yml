services:
  postgres:
    image: postgres:18-alpine
    container_name: monorail-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgress
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: monorail
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgress -d monorail"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
    driver: local
