# Who this project is and what stack it belongs to
$schema: "https://moonrepo.dev/schemas/project.json"

id: "auth-app"
language: "rust"
stack: "backend"
layer: "application" # or 'library' if it's a shared crate

project:
  name: "Auth Service"
  description: "Autherntificates users, manages sessions, etc"

# Tasks: the commands Moon knows how to run for this project
tasks:
  build:
    command: "cargo build"
    inputs:
      - "src/**/*.rs"
      - "Cargo.toml"
    outputs:
      - "target/debug/auth-app"

  test:
    command: "cargo test"
    inputs:
      - "src/**/*.rs"
      - "tests/**/*.rs"

  lint:
    command: "cargo clippy"
    args:
      - "--"
      - "-D"
      - "warnings"

  dev:
    command: "cargo run"
    preset: "server" # marks it as persistent, streams output


# If this crate depends on another project in the monorepo

