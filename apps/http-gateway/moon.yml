# Who this project is and what stack it belongs to
$schema: "https://moonrepo.dev/schemas/project.json"

id: "http-gateway"
language: "rust"
stack: "backend"
layer: "application" # or 'library' if it's a shared crate

project:
  name: "Http Gateway"
  description: "simple gateway module routing and sanitizing http requests from outside into internal gRPC network"

dependsOn:
  - "config-lib"

# Tasks: the commands Moon knows how to run for this project
tasks:
  build:
    command: "cargo build"
    inputs:
      - "src/**/*.rs"
      - "Cargo.toml"
    outputs:
      - "target/debug/http-gateway"

  test:
    command: "cargo test"
    inputs:
      - "src/**/*.rs"
      - "tests/**/*.rs"

  lint:
    command: "cargo clippy"
    args:
      - "--"
      - "-D"
      - "warnings"

  dev:
    command: "cargo run"
    preset: "server" # marks it as persistent, streams output


# If this crate depends on another project in the monorepo
