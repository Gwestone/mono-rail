$schema: ../../.moon/cache/schemas/template.json
title: Simple Rust service
description: Simple hello world rust app.
destination: "backend/crates/[name]"

variables:
  name:
    type: string
    default: "my-app"
    prompt: "What is the service name?"
    required: true
  title:
    type: string
    prompt: "Human readable title?"
    default: "My Service"
  description:
    type: string
    prompt: "What does this crate do?"
    default: ""
